services:
  api:
    build: .
    container_name: smart-campus-service
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/smart-campus_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smart-campus_net

  db:
    image: postgres:16-alpine
    restart: always
    container_name: smart-campus_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart-campus_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart-campus_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smart-campus_net

  db_test:
    image: postgres:16-alpine
    container_name: smart-campus_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart-campus_test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart-campus_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smart-campus_net

volumes:
  pg_data:

networks:
  smart-campus_net:
    driver: bridge
